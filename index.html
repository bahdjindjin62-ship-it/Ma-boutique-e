// ---------- Utils ----------
const fmt = (n) => new Intl.NumberFormat("fr-FR").format(Math.round(n || 0)) + " GNF";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const todayKey = () => new Date().toISOString().slice(0, 10);

function fmtDateTime(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" }) +
    " à " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
}

// ---------- Storage (localStorage, namespaced) ----------
const KEYS = {
  PRODUCTS: "boutique:products",
  SALES: "boutique:sales",
  CLIENTS: "boutique:clients",
  VENDORS: "boutique:vendors",
  ACTIVE_VENDOR: "boutique:activeVendor",
};

function lsGet(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) {
    return fallback;
  }
}
function lsSet(key, value) {
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (e) {
    console.error("storage write failed", e);
  }
}

// ---------- Seed data ----------
const SEED_PRODUCTS = [
  { id: uid(), name: "Chemise homme", category: "Vêtements", price: 120000, cost: 80000, stock: 14, minStock: 5 },
  { id: uid(), name: "Robe femme", category: "Vêtements", price: 200000, cost: 130000, stock: 8, minStock: 4 },
  { id: uid(), name: "Sandales", category: "Chaussures", price: 90000, cost: 55000, stock: 3, minStock: 5 },
  { id: uid(), name: "Sac à main", category: "Accessoires", price: 150000, cost: 95000, stock: 6, minStock: 3 },
  { id: uid(), name: "Casquette", category: "Accessoires", price: 35000, cost: 18000, stock: 20, minStock: 8 },
];
const SEED_VENDORS = [{ id: uid(), name: "Gérant·e" }];
// ---------- Main App ----------
function App() {
  const [tab, setTab] = useState("vente");
  const [products, setProducts] = useState([]);
  const [sales, setSales] = useState([]);
  const [clients, setClients] = useState([]);
  const [vendors, setVendors] = useState([]);
  const [activeVendorId, setActiveVendorId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);
  const [receiptSale, setReceiptSale] = useState(null);

  useEffect(() => {
    const p = lsGet(KEYS.PRODUCTS, null);
    const s = lsGet(KEYS.SALES, []);
    const c = lsGet(KEYS.CLIENTS, []);
    const v = lsGet(KEYS.VENDORS, null);
    const av = lsGet(KEYS.ACTIVE_VENDOR, null);

    const finalProducts = p && p.length ? p : SEED_PRODUCTS;
    const finalVendors = v && v.length ? v : SEED_VENDORS;
    if (!p) lsSet(KEYS.PRODUCTS, finalProducts);
    if (!v) lsSet(KEYS.VENDORS, finalVendors);

    setProducts(finalProducts);
    setSales(s);
    setClients(c);
    setVendors(finalVendors);
    setActiveVendorId(av || finalVendors[0]?.id || null);
    setLoading(false);
  }, []);

  const showToast = useCallback((msg, kind = "success") => {
    setToast({ msg, kind, id: uid() });
    setTimeout(() => setToast(null), 2400);
  }, []);

  const updateProducts = useCallback((next) => {
    setProducts(next);
    lsSet(KEYS.PRODUCTS, next);
  }, []);
  const updateSales = useCallback((next) => {
    setSales(next);
    lsSet(KEYS.SALES, next);
  }, []);
  const updateClients = useCallback((next) => {
    setClients(next);
    lsSet(KEYS.CLIENTS, next);
  }, []);
  const updateVendors = useCallback((next) => {
    setVendors(next);
    lsSet(KEYS.VENDORS, next);
  }, []);
  const setActiveVendor = useCallback((id) => {
    setActiveVendorId(id);
    lsSet(KEYS.ACTIVE_VENDOR, id);
  }, []);

  const activeVendor = vendors.find((v) => v.id === activeVendorId) || vendors[0];

  if (loading) {
    return (
      <div style={styles.loadingScreen}>
        <div style={styles.loadingDot} />
        <span style={{ marginLeft: 12, color: "#8a8378" }}>Chargement de la boutique…</span>
      </div>
    );
  }

  return (
    <div style={styles.app}>
      <style>{globalCss}</style>
      <Header
        tab={tab} setTab={setTab}
        vendors={vendors} activeVendor={activeVendor} setActiveVendor={setActiveVendor}
        updateVendors={updateVendors} showToast={showToast}
      />
      <main style={styles.main}>
        {tab === "vente" && (
          <VenteTab
            products={products} updateProducts={updateProducts}
            sales={sales} updateSales={updateSales}
            clients={clients} updateClients={updateClients}
            activeVendor={activeVendor}
            showToast={showToast}
            onShowReceipt={setReceiptSale}
          />
        )}
        {tab === "stock" && (
          <StockTab products={products} updateProducts={updateProducts} showToast={showToast} />
        )}
        {tab === "clients" && (
          <ClientsTab
            clients={clients} updateClients={updateClients}
            sales={sales} updateSales={updateSales}
            showToast={showToast}
          />
        )}
        {tab === "rapports" && (
          <RapportsTab products={products} sales={sales} clients={clients} />
        )}
      </main>
      {toast && <Toast toast={toast} />}
      {receiptSale && (
        <ReceiptModal sale={receiptSale} onClose={() => setReceiptSale(null)} />
      )}
    </div>
  );
}

// ---------- Header / Nav ----------
function Header({ tab, setTab, vendors, activeVendor, setActiveVendor, updateVendors, showToast }) {
  const [vendorMenuOpen, setVendorMenuOpen] = useState(false);
  const [addingVendor, setAddingVendor] = useState(false);
  const [newVendorName, setNewVendorName] = useState("");

  const items = [
    { id: "vente", label: "Vente", icon: ShoppingCart },
    { id: "stock", label: "Stock", icon: Boxes },
    { id: "clients", label: "Clients", icon: Users },
    { id: "rapports", label: "Rapports", icon: BarChart3 },
  ];

  const addVendor = () => {
    const name = newVendorName.trim();
    if (!name) return;
    const v = { id: uid(), name };
    updateVendors([...vendors, v]);
    setActiveVendor(v.id);
    setNewVendorName("");
    setAddingVendor(false);
    setVendorMenuOpen(false);
    showToast(`Vendeur "${name}" ajouté`);
  };

  return (
    <header style={styles.header}>
      <div style={styles.brandRow}>
        <div style={styles.brandMark}>B</div>
        <div style={{ flex: 1 }}>
          <div style={styles.brandTitle}>Ma Boutique</div>
          <div style={styles.brandSub}>Gestion quotidienne</div>
        </div>

        <div style={{ position: "relative" }}>
          <button
            onClick={() => setVendorMenuOpen((o) => !o)}
            style={styles.vendorBtn}
          >
            <UserCircle size={16} />
            <span>{activeVendor?.name || "Vendeur"}</span>
            <ChevronDown size={14} />
          </button>
          {vendorMenuOpen && (
            <>
              <div style={styles.dropdownOverlay} onClick={() => { setVendorMenuOpen(false); setAddingVendor(false); }} />
              <div style={styles.vendorDropdown}>
                <div style={styles.vendorDropdownLabel}>Vendeur actif</div>
                {vendors.map((v) => (
                  <button
                    key={v.id}
                    onClick={() => { setActiveVendor(v.id); setVendorMenuOpen(false); }}
                    style={styles.vendorOption}
                  >
                    <span>{v.name}</span>
                    {v.id === activeVendor?.id && <Check size={14} color="#5B7A4C" />}
                  </button>
                ))}
                <div style={styles.vendorDropdownDivider} />
                {!addingVendor ? (
                  <button onClick={() => setAddingVendor(true)} style={styles.vendorAddOption}>
                    <Plus size={14} /> Ajouter un vendeur
                  </button>
                ) : (
                  <div style={styles.vendorAddForm}>
                    <input
                      autoFocus
                      placeholder="Nom du vendeur"
                      value={newVendorName}
                      onChange={(e) => setNewVendorName(e.target.value)}
                      onKeyDown={(e) => e.key === "Enter" && addVendor()}
                      style={styles.vendorAddInput}
                    />
                    <button onClick={addVendor} style={styles.vendorAddConfirm}>
                      <Check size={14} />
                    </button>
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      </div>
      <nav style={styles.nav}>
        {items.map(({ id, label, icon: TabIcon }) => (
          <button
            key={id}
            onClick={() => setTab(id)}
            style={{ ...styles.navBtn, ...(tab === id ? styles.navBtnActive : {}) }}
          >
            <TabIcon size={17} strokeWidth={2.2} />
            <span>{label}</span>
          </button>
        ))}
      </nav>
    </header>
  );
}

// ---------- Toast ----------
function Toast({ toast }) {
  return (
    <div style={{ ...styles.toast, borderColor: toast.kind === "error" ? "#c2533f" : "#3f7d5e" }}>
      {toast.msg}
    </div>
  );
}
// =====================================================================
// VENTE TAB
// =====================================================================
function VenteTab({ products, updateProducts, sales, updateSales, clients, updateClients, activeVendor, showToast, onShowReceipt }) {
  const [query, setQuery] = useState("");
  const [cart, setCart] = useState([]);
  const [paymentType, setPaymentType] = useState("comptant"); // comptant | credit
  const [selectedClientId, setSelectedClientId] = useState("");
  const [clientPickerOpen, setClientPickerOpen] = useState(false);
  const [newClientName, setNewClientName] = useState("");
  const [newClientPhone, setNewClientPhone] = useState("");
  const [addingClient, setAddingClient] = useState(false);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return products;
    return products.filter(
      (p) => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q)
    );
  }, [products, query]);

  const addToCart = (product) => {
    if (product.stock <= 0) {
      showToast(`${product.name} — stock épuisé`, "error");
      return;
    }
    setCart((c) => {
      const existing = c.find((i) => i.productId === product.id);
      if (existing) {
        if (existing.qty + 1 > product.stock) {
          showToast(`Stock insuffisant pour ${product.name}`, "error");
          return c;
        }
        return c.map((i) => (i.productId === product.id ? { ...i, qty: i.qty + 1 } : i));
      }
      return [...c, { productId: product.id, qty: 1 }];
    });
  };

  const changeQty = (productId, delta) => {
    const product = products.find((p) => p.id === productId);
    setCart((c) =>
      c.map((i) => {
        if (i.productId !== productId) return i;
        const newQty = i.qty + delta;
        if (newQty > product.stock) {
          showToast(`Stock insuffisant pour ${product.name}`, "error");
          return i;
        }
        return { ...i, qty: newQty };
      }).filter((i) => i.qty > 0)
    );
  };

  const removeFromCart = (productId) => setCart((c) => c.filter((i) => i.productId !== productId));

  const cartDetailed = cart.map((i) => {
    const p = products.find((pp) => pp.id === i.productId);
    return { ...i, product: p, lineTotal: p ? p.price * i.qty : 0 };
  });

  const total = cartDetailed.reduce((s, i) => s + i.lineTotal, 0);
  const itemCount = cartDetailed.reduce((s, i) => s + i.qty, 0);
  const selectedClient = clients.find((c) => c.id === selectedClientId);

  const addClientInline = () => {
    const name = newClientName.trim();
    if (!name) return;
    const c = { id: uid(), name, phone: newClientPhone.trim(), createdAt: new Date().toISOString() };
    updateClients([...clients, c]);
    setSelectedClientId(c.id);
    setNewClientName("");
    setNewClientPhone("");
    setAddingClient(false);
    setClientPickerOpen(false);
    showToast(`Client "${name}" ajouté`);
  };

  const resetSaleForm = () => {
    setCart([]);
    setPaymentType("comptant");
    setSelectedClientId("");
  };

  const finalizeSale = () => {
    if (cart.length === 0) return;
    if (paymentType === "credit" && !selectedClient) {
      showToast("Choisis un client pour une vente à crédit", "error");
      return;
    }

    const sale = {
      id: uid(),
      date: new Date().toISOString(),
      vendorId: activeVendor?.id || null,
      vendorName: activeVendor?.name || "—",
      paymentType,
      clientId: selectedClient?.id || null,
      clientName: selectedClient?.name || null,
      items: cartDetailed.map((i) => ({
        productId: i.productId,
        name: i.product.name,
        qty: i.qty,
        price: i.product.price,
        cost: i.product.cost,
        lineTotal: i.lineTotal,
      })),
      total,
    };

    const nextProducts = products.map((p) => {
      const inCart = cart.find((i) => i.productId === p.id);
      if (!inCart) return p;
      return { ...p, stock: Math.max(0, p.stock - inCart.qty) };
    });
    updateProducts(nextProducts);
    updateSales([sale, ...sales]);

    if (paymentType === "credit" && selectedClient) {
      const nextClients = clients.map((c) =>
        c.id === selectedClient.id ? { ...c, balance: (c.balance || 0) + total } : c
      );
      updateClients(nextClients);
    }

    showToast(paymentType === "credit" ? `Vente à crédit enregistrée — ${fmt(total)}` : `Vente encaissée — ${fmt(total)}`);
    onShowReceipt(sale);
    resetSaleForm();
  };

  return (
    <div style={styles.venteGrid} className="vente-grid-mobile">
      <div>
        <div style={styles.searchBar}>
          <Search size={16} color="#8a8378" />
          <input
            placeholder="Rechercher un article, une catégorie…"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            style={styles.searchInput}
          />
        </div>

        <div style={styles.productGrid}>
          {filtered.length === 0 && (
            <div style={styles.emptyState}>Aucun article ne correspond à cette recherche.</div>
          )}
          {filtered.map((p) => (
            <button
              key={p.id}
              onClick={() => addToCart(p)}
              disabled={p.stock <= 0}
              style={{ ...styles.productCard, ...(p.stock <= 0 ? styles.productCardDisabled : {}) }}
            >
              <div style={styles.productCardTop}>
                <span style={styles.productCardCat}>{p.category}</span>
                {p.stock <= p.minStock && p.stock > 0 && <AlertTriangle size={13} color="#b8863a" />}
              </div>
              <div style={styles.productCardName}>{p.name}</div>
              <div style={styles.productCardPrice}>{fmt(p.price)}</div>
              <div style={{
                ...styles.productCardStock,

        {cartDetailed.length > 0 && (

                onClick={() => setPaymentType("comptant")}

                {clientPickerOpen && (
                  <>
                    <div style={styles.dropdownOverlay} onClick={() => { setClientPickerOpen(false); setAddingClient(false); }} />
                    <div style={styles.clientDropdown}>
                      {clients.length === 0 && (
                        <div style={styles.vendorDropdownLabel}>Aucun client enregistré</div>
                      )}
                      {clients.map((c) => (
                        <button
                          key={c.id}
                          onClick={() => { setSelectedClientId(c.id); setClientPickerOpen(false); }}
                          style={styles.vendorOption}
                        >
                          <span>{c.name}</span>
                          {(c.balance || 0) > 0 && (
                            <span style={styles.clientBalanceTag}>{fmt(c.balance)}</span>

                      ))}
                      <div style={styles.vendorDropdownDivider} />
                      {!addingClient ? (
                        <button onClick={() => setAddingClient(true)} style={styles.vendorAddOption}>
                          <Plus size={14} /> Nouveau client
                        </button>
                      ) : (
                        <div style={{ padding: "6px 4px", display: "flex", flexDirection: "column", gap: 6 }}>
                          <input
                            autoFocus placeholder="Nom du client"
                            value={newClientName} onChange={(e) => setNewClientName(e.target.value)}
                            style={styles.vendorAddInput}
                          />
                          <input
                            placeholder="Téléphone (optionnel)"
                            value={newClientPhone} onChange={(e) => setNewClientPhone(e.target.value)}
                            style={styles.vendorAddInput}
                          />
                          <button onClick={addClientInline} style={styles.clientAddConfirmBtn}>Ajouter</button>
                        </div>
                      )}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        )}

        <div style={styles.cartFooter}>
          <div style={styles.cartTotalRow}>
            <span>Total</span>
            <span style={styles.cartTotalValue}>{fmt(total)}</span>

            style={{
              ...styles.confirmBtn,
              ...(paymentType === "credit" ? styles.confirmBtnCredit : {}),
              ...(cart.length === 0 ? styles.confirmBtnDisabled : {}),
            }}
          >
            {paymentType === "credit" ? "Enregistrer la vente à crédit" : "Encaisser la vente"}
          </button>
        </div>
      </aside>
    </div>
  );
}

function StockTab({ products, updateProducts, showToast }) {
  const [editing, setEditing] = useState(null);
  const [query, setQuery] = useState("");

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return products;
    return products.filter((p) => p.name.toLowerCase().includes(q));
  }, [products, query]);

  const lowStock = products.filter((p) => p.stock <= p.minStock);

  const saveProduct = (form) => {
    if (!form.name.trim()) {
      showToast("Le nom de l'article est requis", "error");
      return;
    }
    let next;
    if (form.id) {
      next = products.map((p) => (p.id === form.id ? { ...form } : p));
      showToast("Article mis à jour");
    } else {
      next = [...products, { ...form, id: uid() }];
      showToast("Article ajouté au stock");
    }
    updateProducts(next);
    setEditing(null);
  };

  const deleteProduct = (id) => {
    updateProducts(products.filter((p) => p.id !== id));
    setEditing(null);
    showToast("Article supprimé");
  };

  return (
    <div>
      {lowStock.length > 0 && (
        <div style={styles.alertBanner}>
          <AlertTriangle size={16} color="#b8863a" />
          <span>
            {lowStock.length} article{lowStock.length > 1 ? "s" : ""} en stock faible — {lowStock.map((p) => p.name).join(", ")}
          </span>
        </div>
      )}

      <div style={styles.stockToolbar}>
        <div style={styles.searchBar}>
          <Search size={16} color="#8a8378" />
          <input placeholder="Rechercher un article…" value={query} onChange={(e) => setQuery(e.target.value)} style={styles.searchInput} />
        </div>
        <ExportMenu products={products} kind="products" />
        <button
          onClick={() => setEditing({ id: null, name: "", category: "", price: 0, cost: 0, stock: 0, minStock: 3 })}
          style={styles.addBtn}
        >
          <Plus size={16} /> Nouvel article
        </button>
      </div>

      <div style={styles.stockTableWrap}>
        <table style={styles.table}>
          <thead>
            <tr>
              <th style={styles.th}>Article</th>
              <th style={styles.th}>Catégorie</th>
              <th style={styles.th}>Prix vente</th>
              <th style={styles.th}>Coût</th>
              <th style={styles.th}>Stock</th>
              <th style={styles.th}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((p) => (
              <tr key={p.id} style={styles.tr}>
                <td style={styles.tdName}>{p.name}</td>
                <td style={styles.td}>{p.category || "—"}</td>
                <td style={styles.td}>{fmt(p.price)}</td>
                <td style={styles.td}>{fmt(p.cost)}</td>
                <td style={styles.td}>
                  <span style={{
                    ...styles.stockPill,
                    background: p.stock <= p.minStock ? "#fbeee0" : "#eef2e9",
                    color: p.stock <= p.minStock ? "#b8863a" : "#5b7a4c",
                  }}>{p.stock}</span>
                </td>
                <td style={styles.td}>
                  <button onClick={() => setEditing(p)} style={styles.editBtn}><Edit3 size={14} /></button>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={6} style={styles.emptyTableCell}>Aucun article trouvé.</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {editing && (
        <ProductModal
          product={editing}
          onClose={() => setEditing(null)}
          onSave={saveProduct}
          onDelete={editing.id ? () => deleteProduct(editing.id) : null}
        />
      )}
    </div>
  );
}

function ClientsTab({ clients, updateClients, sales, updateSales, showToast }) {
  const [query, setQuery] = useState("");
  const [editing, setEditing] = useState(null);
  const [payingClient, setPayingClient] = useState(null);
  const [detailClient, setDetailClient] = useState(null);

  const filtered = useMemo(() => {
    const q = query.trim().toLowerCase();
    if (!q) return clients;
    return clients.filter((c) => c.name.toLowerCase().includes(q));
  }, [clients, query]);

  const totalDebt = clients.reduce((s, c) => s + (c.balance || 0), 0);
  const debtors = clients.filter((c) => (c.balance || 0) > 0);

  const saveClient = (form) => {
    if (!form.name.trim()) {
      showToast("Le nom du client est requis", "error");
      return;
    }
    let next;
    if (form.id) {
      next = clients.map((c) => (c.id === form.id ? { ...c, name: form.name, phone: form.phone } : c));
      showToast("Client mis à jour");
    } else {
      next = [...clients, { id: uid(), name: form.name, phone: form.phone, balance: 0, createdAt: new Date().toISOString() }];
      showToast("Client ajouté");
    }
    updateClients(next);
    setEditing(null);
  };

  const deleteClient = (id) => {
    updateClients(clients.filter((c) => c.id !== id));
    setEditing(null);
    showToast("Client supprimé");
  };

  const recordPayment = (clientId, amount) => {
    if (amount <= 0) return;
    const next = clients.map((c) =>
      c.id === clientId ? { ...c, balance: Math.max(0, (c.balance || 0) - amount) } : c
    );
    updateClients(next);
    setPayingClient(null);
    showToast(`Paiement de ${fmt(amount)} enregistré`);
  };

  const clientSales = (clientId) => sales.filter((s) => s.clientId === clientId);

  return (
    <div>
      <div style={styles.statGrid}>
        <StatCard icon={Users} label="Clients enregistrés" value={clients.length} accent="#8a6f4f" />
        <StatCard icon={CreditCard} label="Total à recevoir" value={fmt(totalDebt)} accent="#b8863a" />
        <StatCard icon={AlertTriangle} label="Clients endettés" value={debtors.length} accent="#c2533f" />
      </div>

      <div style={styles.stockToolbar}>
        <div style={styles.searchBar}>
          <Search size={16} color="#8a8378" />
          <input placeholder="Rechercher un client…" value={query} onChange={(e) => setQuery(e.target.value)} style={styles.searchInput} />
        </div>
        <ExportMenu clients={clients} kind="clients" />
        <button onClick={() => setEditing({ id: null, name: "", phone: "" })} style={styles.addBtn}>
          <Plus size={16} /> Nouveau client
        </button>
      </div>

      <div style={styles.stockTableWrap}>
        <table style={styles.table}>
          <thead>
            <tr>
              <th style={styles.th}>Client</th>
              <th style={styles.th}>Téléphone</th>
              <th style={styles.th}>Solde dû</th>
              <th style={styles.th}></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((c) => (
              <tr key={c.id} style={styles.tr}>
                <td style={styles.tdName}>
                  <button onClick={() => setDetailClient(c)} style={styles.clientNameLink}>{c.name}</button>
                </td>
                <td style={styles.td}>{c.phone || "—"}</td>
                <td style={styles.td}>
                  {(c.balance || 0) > 0 ? (
                    <span style={{ ...styles.stockPill, background: "#fbeee0", color: "#b8863a" }}>{fmt(c.balance)}</span>
                  ) : (
                    <span style={{ ...styles.stockPill, background: "#eef2e9", color: "#5b7a4c" }}>À jour</span>
                  )}
                </td>
                <td style={styles.td}>
                  <div style={{ display: "flex", gap: 6 }}>
                    {(c.balance || 0) > 0 && (
                      <button onClick={() => setPayingClient(c)} style={styles.payBtn}>Encaisser</button>
                    )}
                    <button onClick={() => setEditing(c)} style={styles.editBtn}><Edit3 size={14} /></button>
                  </div>
                </td>
              </tr>
            ))}
            {filtered.length === 0 && (
              <tr><td colSpan={4} style={styles.emptyTableCell}>Aucun client trouvé.</td></tr>
            )}
          </tbody>
        </table>
      </div>

      {editing && (
        <ClientModal
          client={editing}
          onClose={() => setEditing(null)}
          onSave={saveClient}
          onDelete={editing.id ? () => deleteClient(editing.id) : null}
        />
      )}

      {payingClient && (
        <PaymentModal client={payingClient} onClose={() => setPayingClient(null)} onConfirm={recordPayment} />
      )}

      {detailClient && (
        <ClientDetailModal
          client={detailClient}
          sales={clientSales(detailClient.id)}
          onClose={() => setDetailClient(null)}
        />
      )}
    </div>
  );
}

function ReceiptModal({ sale, onClose }) {
  const printReceipt = () => {
    const win = window.open("", "_blank", "width=380,height=600");
    if (!win) return;
    const itemsHtml = sale.items.map(it => `
      <tr>
        <td style="padding:4px 0;">${escapeHtml(it.name)}</td>
        <td style="padding:4px 0;text-align:center;">${it.qty}</td>
        <td style="padding:4px 0;text-align:right;">${fmt(it.lineTotal)}</td>
      </tr>`).join("");
    win.document.write(`
      <html><head><title>Reçu</title>
      <style>
        body { font-family: 'Courier New', monospace; padding: 16px; max-width: 320px; margin: 0 auto; color: #1a1a1a; }
        h2 { text-align: center; margin: 0 0 2px; font-size: 16px; }

        .meta { font-size: 11px; color: #555; margin: 2px 0; }
        @media print { body { padding: 0; } }
      </style>
      </head><body>
        <h2>Ma Boutique</h2>
        <div class="sub">Reçu de vente</div>
        <div class="meta">Date : ${fmtDateTime(sale.date)}</div>
        <div class="meta">Vendeur : ${escapeHtml(sale.vendorName || "—")}</div>
        ${sale.clientName ? `<div class="meta">Client : ${escapeHtml(sale.clientName)}</div>` : ""}
        <div class="meta">Paiement : ${sale.paymentType === "credit" ? "À crédit" : "Comptant"}</div>
        <div class="divider"></div>
        <table>
          <thead><tr style="font-weight:bold;"><td>Article</td><td style="text-align:center;">Qté</td><td style="text-align:right;">Total</td></tr></thead>
          <tbody>${itemsHtml}</tbody>
        </table>
        <div class="divider"></div>
        <div class="total-row"><span>TOTAL</span><span>${fmt(sale.total)}</span></div>
        <div class="divider"></div>
        <div style="text-align:center; font-size:11px; color:#777; margin-top:10px;">Merci de votre achat</div>
      </body></html>
    `);
    win.document.close();
    win.focus();
    win.print();
  };

  return (
    <div style={styles.modalOverlay} onClick={onClose}>

            <div style={styles.receiptMeta}>Vendeur : {sale.vendorName}</div>
            {sale.clientName && <div style={styles.receiptMeta}>Client : {sale.clientName}</div>}
            <div style={styles.receiptDivider} />
            {sale.items.map((it, idx) => (
              <div key={idx} style={styles.receiptItemRow}>

}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

// =====================================================================
// EXPORT (CSV / Excel)
// =====================================================================
function ExportMenu({ products, sales, clients, kind }) {
  const [open, setOpen] = useState(false);

  const downloadCsv = (filename, rows) => {
    const csv = rows.map((row) =>
      row.map((cell) => {
        const s = String(cell ?? "");
        return /[",\n;]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(";")
    ).join("\r\n");
    const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
    triggerDownload(blob, filename);
  };

  const downloadXlsx = (filename, sheetName, rows) => {
    if (typeof XLSX === "undefined") {
      alert("Export Excel indisponible hors-ligne. Utilisez l'export CSV.");
      return;
    }
    const ws = XLSX.utils.aoa_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, sheetName);
    XLSX.writeFile(wb, filename);
  };

  const triggerDownload = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const exportProducts = (format) => {
    const rows = [
      ["Article", "Catégorie", "Prix de vente (GNF)", "Coût (GNF)", "Stock", "Seuil d'alerte"],
      ...products.map((p) => [p.name, p.category, p.price, p.cost, p.stock, p.minStock]),
    ];
    if (format === "xlsx") downloadXlsx("stock.xlsx", "Stock", rows);
    else downloadCsv("stock.csv", rows);
    setOpen(false);
  };

  const exportSales = (format) => {
    const rows = [["Date", "Vendeur", "Client", "Paiement", "Article", "Quantité", "Prix unitaire (GNF)", "Total ligne (GNF)", "Total vente (GNF)"]];
    sales.forEach((s) => {
      s.items.forEach((it) => {
        rows.push([fmtDateTime(s.date), s.vendorName || "—", s.clientName || "—", s.paymentType === "credit" ? "Crédit" : "Comptant", it.name, it.qty, it.price, it.lineTotal, s.total]);
      });
    });
    if (format === "xlsx") downloadXlsx("ventes.xlsx", "Ventes", rows);
    else downloadCsv("ventes.csv", rows);
    setOpen(false);
  };

  const exportClients = (format) => {
    const rows = [
      ["Client", "Téléphone", "Solde dû (GNF)"],
      ...clients.map((c) => [c.name, c.phone || "", c.balance || 0]),
    ];
    if (format === "xlsx") downloadXlsx("clients.xlsx", "Clients", rows);
    else downloadCsv("clients.csv", rows);
    setOpen(false);
  };

  const handlers = {
    products: exportProducts,
    sales: exportSales,
    clients: exportClients,
  };
  const handler = handlers[kind];

  return (
    <div style={{ position: "relative" }}>
      <button onClick={() => setOpen((o) => !o)} style={styles.exportBtn}>
        <Download size={15} /> Exporter
      </button>
      {open && (
        <>
          <div style={styles.dropdownOverlay} onClick={() => setOpen(false)} />
          <div style={styles.exportDropdown}>
            <button onClick={() => handler("xlsx")} style={styles.vendorOption}>Excel (.xlsx)</button>
            <button onClick={() => handler("csv")} style={styles.vendorOption}>CSV (.csv)</button>
          </div>
        </>
      )}
    </div>
  );
}
// =====================================================================
// RAPPORTS TAB
// =====================================================================
function RapportsTab({ products, sales, clients }) {
  const [range, setRange] = useState("7");

  const cutoff = useMemo(() => {
    const d = new Date();
    d.setDate(d.getDate() - Number(range));
    return d;
  }, [range]);

  const filteredSales = useMemo(() => sales.filter((s) => new Date(s.date) >= cutoff), [sales, cutoff]);

  const revenue = filteredSales.reduce((s, sale) => s + sale.total, 0);
  const profit = filteredSales.reduce(
    (s, sale) => s + sale.items.reduce((ss, it) => ss + (it.price - it.cost) * it.qty, 0), 0
  );
  const txCount = filteredSales.length;
  const itemsSold = filteredSales.reduce((s, sale) => s + sale.items.reduce((ss, it) => ss + it.qty, 0), 0);
  const creditSales = filteredSales.filter((s) => s.paymentType === "credit");
  const creditTotal = creditSales.reduce((s, sale) => s + sale.total, 0);
  const totalDebt = clients.reduce((s, c) => s + (c.balance || 0), 0);

  const productTotals = {};
  filteredSales.forEach((sale) => {
    sale.items.forEach((it) => {
      if (!productTotals[it.name]) productTotals[it.name] = { qty: 0, revenue: 0 };
      productTotals[it.name].qty += it.qty;
      productTotals[it.name].revenue += it.lineTotal;
    });
  });
  const topProducts = Object.entries(productTotals).sort((a, b) => b[1].revenue - a[1].revenue).slice(0, 6);

  const vendorTotals = {};
  filteredSales.forEach((sale) => {
    const name = sale.vendorName || "—";
    if (!vendorTotals[name]) vendorTotals[name] = { qty: 0, revenue: 0 };
    vendorTotals[name].revenue += sale.total;
    vendorTotals[name].qty += 1;
  });
  const vendorRanking = Object.entries(vendorTotals).sort((a, b) => b[1].revenue - a[1].revenue);

  const lowStock = products.filter((p) => p.stock <= p.minStock);

  const days = Number(range) <= 14 ? Number(range) : 14;
  const dailyData = useMemo(() => {
    const arr = [];
    for (let i = days - 1; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      const dayTotal = sales.filter((s) => s.date.slice(0, 10) === key).reduce((sum, s) => sum + s.total, 0);
      arr.push({ label: d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit" }), value: dayTotal });
    }
    return arr;
  }, [sales, days]);
  const maxDaily = Math.max(...dailyData.map((d) => d.value), 1);

  return (
    <div>
      <div style={styles.rangeBarRow}>
        <div style={styles.rangeBar}>
          {[{ id: "1", label: "Aujourd'hui" }, { id: "7", label: "7 jours" }, { id: "30", label: "30 jours" }, { id: "9999", label: "Tout" }].map((r) => (
            <button key={r.id} onClick={() => setRange(r.id)} style={{ ...styles.rangeBtn, ...(range === r.id ? styles.rangeBtnActive : {}) }}>
              {r.label}
            </button>
          ))}
        </div>
        <ExportMenu sales={filteredSales} kind="sales" />
      </div>

      <div style={styles.statGrid}>
        <StatCard icon={DollarSign} label="Chiffre d'affaires" value={fmt(revenue)} accent="#5b7a4c" />
        <StatCard icon={TrendingUp} label="Bénéfice estimé" value={fmt(profit)} accent="#3f7d5e" />
        <StatCard icon={Receipt} label="Ventes" value={txCount} accent="#8a6f4f" />
        <StatCard icon={Package} label="Articles vendus" value={itemsSold} accent="#a06b3f" />
        <StatCard icon={CreditCard} label="Ventes à crédit" value={fmt(creditTotal)} accent="#b8863a" />
        <StatCard icon={Users} label="Total à recevoir" value={fmt(totalDebt)} accent="#c2533f" />
      </div>

      <div style={styles.reportColumns} className="report-columns-mobile">
        <div style={styles.reportCard}>
          <div style={styles.reportCardTitle}>Évolution des ventes</div>
          <div style={styles.barChart}>
            {dailyData.map((d, idx) => (
              <div key={idx} style={styles.barCol}>
                <div style={styles.barTrack}>
                  <div style={{ ...styles.barFill, height: `${Math.max(4, (d.value / maxDaily) * 100)}%` }} title={fmt(d.value)} />
                </div>
                <span style={styles.barLabel}>{d.label}</span>
              </div>
            ))}
          </div>
        </div>

        <div style={styles.reportCard}>
          <div style={styles.reportCardTitle}>Articles les plus vendus</div>
          {topProducts.length === 0 && <div style={styles.emptyState}>Aucune vente sur cette période.</div>}
          {topProducts.map(([name, data], idx) => (
            <div key={name} style={styles.topRow}>
              <span style={styles.topRank}>{idx + 1}</span>
              <div style={{ flex: 1 }}>
                <div style={styles.topName}>{name}</div>
                <div style={styles.topMeta}>{data.qty} vendu(s)</div>
              </div>
              <div style={styles.topRevenue}>{fmt(data.revenue)}</div>
            </div>
          ))}
        </div>
      </div>

      {vendorRanking.length > 0 && (
        <div style={styles.reportCard}>
          <div style={styles.reportCardTitle}>Ventes par vendeur</div>
          {vendorRanking.map(([name, data], idx) => (
            <div key={name} style={styles.topRow}>
              <span style={styles.topRank}>{idx + 1}</span>
              <div style={{ flex: 1 }}>
                <div style={styles.topName}>{name}</div>
                <div style={styles.topMeta}>{data.qty} vente(s)</div>
              </div>
              <div style={styles.topRevenue}>{fmt(data.revenue)}</div>
            </div>
          ))}
        </div>
      )}

      <div style={styles.reportCard}>
        <div style={styles.reportCardTitle}>État du stock</div>
        {lowStock.length === 0 ? (
          <div style={styles.emptyState}>Tous les articles ont un stock suffisant.</div>
        ) : (
          lowStock.map((p) => (
            <div key={p.id} style={styles.topRow}>
              <AlertTriangle size={15} color="#b8863a" />
              <div style={{ flex: 1, marginLeft: 4 }}>
                <div style={styles.topName}>{p.name}</div>
                <div style={styles.topMeta}>Seuil d'alerte : {p.minStock}</div>
              </div>
              <span style={{ ...styles.stockPill, background: "#fbeee0", color: "#b8863a" }}>{p.stock} restant{p.stock > 1 ? "s" : ""}</span>
            </div>
          ))
        )}
      </div>
    </div>
  );
}
